{% extends "base.html" %}
{% block title %}Contact NAPTRIO{% endblock %}
{% block content %}
<section class="py-20 bg-white">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
    <h1 class="font-clash text-5xl font-semibold mb-6">Contact Us</h1>
    <p class="text-gray-700 font-roboto mb-8">Reach our team — we respond within 1 business day.</p>
    <form class="space-y-4">
      <input type="text"  placeholder="Your name"   class="w-full px-4 py-3 border border-gray-300 rounded-lg" />
      <input type="email" placeholder="Email"        class="w-full px-4 py-3 border border-gray-300 rounded-lg" />
      <textarea placeholder="How can we help?" rows="5" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></textarea>
      <button class="bg-[#0c5faa] hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-clash">Send message</button>
    </form>
  </div>
</section>
{% endblock %}
